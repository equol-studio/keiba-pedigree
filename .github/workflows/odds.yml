name: fetch-odds
# 開催日(土日)の日中JSTに10分毎、函館全レースの単勝/複勝/人気を取得してコミット
on:
  schedule:
    - cron: '*/10 0-9 * * 6,0'   # UTC 00:00-09:59 (土日) = JST 09:00-18:59
  workflow_dispatch:
jobs:
  odds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch odds (today JST)
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          echo "date=$DATE"
          node scrape/fetch-odds.mjs "$DATE"
      - name: Commit if changed
        run: |
          git config user.name "odds-bot"
          git config user.email "odds-bot@users.noreply.github.com"
          git add odds-data.js
          if git diff --cached --quiet; then
            echo "no odds change"
          else
            git commit -m "odds $(TZ=Asia/Tokyo date +'%m-%d %H:%M') [skip ci]"
            git push
          fi
